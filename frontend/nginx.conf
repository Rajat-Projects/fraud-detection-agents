server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin";

    # React Router support — all routes serve index.html
    # Without this, refreshing on /dashboard returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite fingerprints filenames so
    # cache-busting is automatic on deploy
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML — ensures users always get the latest index.html
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
