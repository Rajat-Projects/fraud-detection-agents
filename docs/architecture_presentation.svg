<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 1060"
     width="900" height="1060"
     style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="900" height="1060" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 1: TITLE (y: 0-60)                                -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="900" height="60" fill="#1e293b"/>
  <text x="450" y="30" text-anchor="middle"
        font-size="20" font-weight="bold" fill="white">
    FraudShield — Multi-Agent Fraud Detection System
  </text>
  <text x="450" y="50" text-anchor="middle"
        font-size="11" fill="#94a3b8">LangGraph StateGraph  ·  Google Gemini 2.5 Flash  ·  Temperature: 0.1  ·  7 Agents</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 2: INPUT BOX (y: 80-130)                          -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="150" y="80" width="600" height="50"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <text x="450" y="100" text-anchor="middle"
        font-size="13" font-weight="bold" fill="#92400e">TRANSACTION INPUT</text>
  <text x="450" y="118" text-anchor="middle"
        font-size="11" fill="#b45309">Unstructured · Inconsistent · Potentially Malicious</text>
  <line x1="425" y1="130" x2="425" y2="155"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 3: BOUNDARY SECURITY (y: 155-210)                 -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="155" width="700" height="55"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="8"/>
  <text x="450" y="175" text-anchor="middle"
        font-size="12" font-weight="bold" fill="#15803d">&#x1F6E1;&#xFE0F;  BOUNDARY SECURITY</text>
  <text x="450" y="193" text-anchor="middle"
        font-size="10" fill="#166534">Rate Limiter  ·  Injection Detector (Pattern + Entropy + Structural)  ·  PII Tokenizer</text>
  <line x1="425" y1="210" x2="425" y2="235"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 4: GUARDRAIL SPINE (Agent 7, left sidebar)        -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="235" width="55" height="635"
        fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="6"/>
  <text x="57" y="548" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#15803d"
        transform="rotate(-90, 57, 552)">Guardrail</text>
  <text x="57" y="560" text-anchor="middle"
        font-size="9" fill="#166534"
        transform="rotate(-90, 57, 552)">NO LLM</text>
  <!-- Pre + Post label: horizontal side-by-side, readable, below the sidebar -->
  <text x="57" y="885" text-anchor="middle"
        font-size="8" font-weight="600" fill="#15803d">Pre · Post</text>

  <!-- Guardrail connector dashes to each agent -->
  <line x1="85" y1="282" x2="100" y2="282"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="392" x2="100" y2="392"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="502" x2="100" y2="502"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="612" x2="100" y2="612"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="730" x2="100" y2="730"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="85" y1="847" x2="100" y2="847"
        stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 1: Transaction Analyzer (y=235)                     -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="235" width="650" height="95"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <rect x="100" y="235" width="5" height="95" fill="#6366f1" rx="2"/>
  <text x="125" y="262" font-size="15" font-weight="bold" fill="#1e293b">&#x1F4C4;  Transaction Analyzer</text>
  <rect x="730" y="245" width="45" height="20" rx="10"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="752" y="259" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#6366f1">LLM</text>
  <text x="125" y="283" font-size="12" fill="#475569">Structures unstructured transaction input</text>
  <text x="125" y="303" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Handles ambiguous language that parsers cannot</text>
  <line x1="425" y1="330" x2="425" y2="345"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 2: Anomaly Detection (y=345)                        -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="345" width="650" height="95"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <rect x="100" y="345" width="5" height="95" fill="#6366f1" rx="2"/>
  <text x="125" y="372" font-size="15" font-weight="bold" fill="#1e293b">&#x1F50D;  Anomaly Detection</text>
  <rect x="730" y="355" width="45" height="20" rx="10"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="752" y="369" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#6366f1">LLM</text>
  <text x="125" y="393" font-size="12" fill="#475569">Customer-specific behavioral pattern analysis</text>
  <text x="125" y="413" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Context-constrained &#x2014; cannot see risk score yet (prevents anchoring bias)</text>
  <line x1="425" y1="440" x2="425" y2="455"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 3: Rule Enforcement (y=455) — NO LLM, amber         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="455" width="650" height="95"
        fill="#fffbeb" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <rect x="100" y="455" width="5" height="95" fill="#f59e0b" rx="2"/>
  <text x="125" y="482" font-size="15" font-weight="bold" fill="#1e293b">&#x2696;&#xFE0F;  Rule Enforcement</text>
  <rect x="710" y="465" width="65" height="20" rx="10"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="742" y="479" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#b45309">NO LLM</text>
  <text x="125" y="503" font-size="12" fill="#475569">Deterministic compliance &#x2014; 5 regulatory rules</text>
  <text x="125" y="523" font-size="11" font-style="italic" fill="#b45309">&#x2192;  LLMs reason around rules. Code never does.</text>
  <line x1="425" y1="550" x2="425" y2="565"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 4: Risk Scoring (y=565)                             -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="565" width="650" height="95"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <rect x="100" y="565" width="5" height="95" fill="#6366f1" rx="2"/>
  <text x="125" y="592" font-size="15" font-weight="bold" fill="#1e293b">&#x1F4CA;  Risk Scoring</text>
  <rect x="730" y="575" width="45" height="20" rx="10"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="752" y="589" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#6366f1">LLM</text>
  <text x="125" y="613" font-size="12" fill="#475569">Synthesizes anomaly + compliance signals into risk score</text>
  <text x="125" y="633" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Non-linear signal interaction &#x2014; formulas cannot capture this</text>
  <line x1="425" y1="660" x2="425" y2="675"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 5: Critic Agent (y=675, h=110) — THE SHOWSTOPPER   -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- Outer glow ring -->
  <rect x="96" y="671" width="658" height="118"
        fill="none" stroke="#f59e0b" stroke-width="2" rx="10" opacity="0.4"/>
  <!-- Main card -->
  <rect x="100" y="675" width="650" height="110"
        fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5" rx="8"/>
  <rect x="100" y="675" width="5" height="110" fill="#6366f1" rx="2"/>
  <text x="125" y="702" font-size="15" font-weight="bold" fill="#1e293b">&#x1F504;  Critic Agent</text>
  <rect x="730" y="685" width="45" height="20" rx="10"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="752" y="699" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#6366f1">LLM</text>
  <!-- SHOWSTOPPER pill -->
  <rect x="265" y="690" width="90" height="18" rx="9"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="310" y="703" text-anchor="middle"
        font-size="9" font-weight="bold" fill="#b45309">SHOWSTOPPER</text>
  <text x="125" y="723" font-size="12" fill="#475569">Adversarially challenges every verdict before it becomes final</text>
  <text x="125" y="743" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Defense attorney framing &#x2014; assumes innocent until proven otherwise</text>
  <text x="125" y="761" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Constitutional floor enforced in code: min score 50 when violations exist</text>
  <line x1="425" y1="785" x2="425" y2="800"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- CRITIC LOOP ARROW (right side) -->
  <path d="M 750,730 C 840,730 840,612 750,612"
        stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"
        fill="none" marker-end="url(#arrowhead-amber)"/>
  <!-- Loop label box -->
  <rect x="800" y="655" width="85" height="42" rx="6"
        fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="842" y="671" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#b45309">OVERTURNED</text>
  <text x="842" y="685" text-anchor="middle"
        font-size="9" fill="#b45309">max 2 loops</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- AGENT 6: Report Generator (y=800)                         -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="800" width="650" height="95"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <rect x="100" y="800" width="5" height="95" fill="#6366f1" rx="2"/>
  <text x="125" y="827" font-size="15" font-weight="bold" fill="#1e293b">&#x1F4CB;  Report Generator</text>
  <rect x="730" y="810" width="45" height="20" rx="10"
        fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="752" y="824" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#6366f1">LLM</text>
  <text x="125" y="848" font-size="12" fill="#475569">Translates pipeline outputs into 60-second analyst briefing</text>
  <text x="125" y="868" font-size="11" font-style="italic" fill="#94a3b8">&#x2192;  Translator only &#x2014; cannot add its own risk assessment</text>
  <line x1="425" y1="895" x2="425" y2="915"
        stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 6: HUMAN ANALYST (y=915)                          -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="100" y="915" width="650" height="70"
        fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="450" y="942" text-anchor="middle"
        font-size="15" font-weight="bold" fill="#15803d">&#x1F464;  Human Analyst Decision</text>
  <text x="450" y="962" text-anchor="middle"
        font-size="12" fill="#166534">System recommends · Human decides · Always</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SECTION 7: AUDIT TRAIL (y=1000)                           -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="200" y="1000" width="500" height="40"
        fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="450" y="1025" text-anchor="middle"
        font-size="11" fill="#64748b">&#x1F512;  SHA-256 Tamper-Evident Audit Trail &#x2014; Every agent. Every decision.</text>


</svg>
